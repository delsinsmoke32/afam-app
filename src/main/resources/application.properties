spring.application.name=afam-backend

# Configurazione della connessione al DB di Docker
spring.datasource.url=jdbc:mysql://localhost:3307/gestionale_afam?createDatabaseIfNotExist=true
spring.datasource.username=root
# Se hai usato il mio file docker-compose, la password è 'root' (o 'vostra_password')
spring.datasource.password=root

# Logica di auto-creazione delle tabelle partendo dalle classi Java
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
